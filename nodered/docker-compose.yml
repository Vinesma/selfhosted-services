services:
  node-red:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - 1880:1880
    networks:
      - node-red-net
    restart: no
    volumes:
      - /mnt/storage/SERVICES/Nodered/data:/data
      - /mnt/storage/SERVICES/Nodered/files:/files
      - /mnt/storage/SERVICES/Syncthing/data:/server/user_data
      - /mnt/storage/SERVICES:/server/services
      - /mnt/storage/MEDIA:/server/user_media

networks:
  node-red-net: