version: "2.1"

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000 #to find use: $ id $USER
      - PGID=1000 #to find use: $ id $USER
      - TZ=America/Sao_Paulo
    volumes:
      - /home/pi/Projects/Sonarr/config:/config
      - /media/pi/Seagate Basic/Media/Shows:/tv
      - /media/pi/Seagate Basic/Torrents:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
