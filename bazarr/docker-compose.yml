version: "2.1"

services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - /home/pi/Projects/Bazarr/config:/config
      - /media/pi/Seagate Basic/Media/Movies:/data/movies
      - /media/pi/Seagate Basic/Media/Shows:/data/tv
    ports:
      - 6767:6767
    restart: unless-stopped
